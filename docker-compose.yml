version: '3.8'

services:
  cli:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CLI_MODE=http
      - CLI_ADDR=:8080
    command: ./kiyoshi-cli -mode=http -addr=:8080

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
    depends_on:
      - cli
